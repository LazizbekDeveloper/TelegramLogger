# TelegramLogger v5.0.1
# Developed by LazizbekDev
# https://t.me/LazizbekDev

# ---------------------
# Bot Configuration
# ---------------------
bot_token: "BOT_TOKEN"                          # Your Telegram Bot API token from @BotFather
chat_id: "CHAT_ID"                              # Target Telegram group/channel ID
thread_id: "THREAD_ID"                          # Forum topic thread ID (only if send_to_thread is true)
send_to_thread: false                           # Send messages to a specific forum topic thread
send_telegram_messages_to_game: false           # Forward Telegram admin messages to Minecraft chat

# ---------------------
# Message Prefix
# ---------------------
plugin_prefix: "&6&lTelegramLogger&7 ➜ &r&a"
telegram_game_message: "&7[&9TG&7] &c%name% &8» &f%message%"
# Available placeholders: %name%, %message%

# ---------------------
# Server Start/Stop
# ---------------------
enable_server_start_stop: true
server_start_message: "<blockquote>🟢 <b>Server started!</b>\nVersion: %version% | Max Players: %max%</blockquote>"
server_stop_message: "<blockquote>🔴 <b>Server stopped!</b></blockquote>"
# Available placeholders: %version%, %max%

# ---------------------
# Join Messages
# ---------------------
enable_join: true
join_message: "<blockquote>➕ <b>%player%</b> joined the game! (%online%/%max%)</blockquote>"
# Available placeholders: %player%, %displayname%, %prefix%, %suffix%, %online%, %max%

# ---------------------
# First Join (new players)
# ---------------------
enable_first_join: true
first_join_message: "<blockquote>🌟 <b>%player%</b> joined for the first time! Welcome! (%online%/%max%)</blockquote>"
# Available placeholders: %player%, %displayname%, %prefix%, %suffix%, %online%, %max%

# ---------------------
# Leave Messages
# ---------------------
enable_leave: true
leave_message: "<blockquote>➖ <b>%player%</b> left the game! (%online%/%max%)</blockquote>"
# Available placeholders: %player%, %displayname%, %prefix%, %suffix%, %online%, %max%

# ---------------------
# Chat Messages
# ---------------------
enable_chat: true
chat_message: "💬 <b>%player%</b> ➥ %message%"
# Available placeholders: %player%, %displayname%, %prefix%, %suffix%, %message%, %online%, %max%

# ---------------------
# Advancement Messages
# ---------------------
enable_advancement: true
advancement_message: "<blockquote>🏆 <b>%player%</b> earned <b>[%advancement%]</b> (%online%/%max%)</blockquote>"
# Available placeholders: %player%, %displayname%, %prefix%, %suffix%, %advancement%, %online%, %max%

# ---------------------
# Death Messages
# ---------------------
enable_death: true
death_message: "<blockquote>💀 %death_message% (%online%/%max%)</blockquote>"
# Available placeholders: %player%, %displayname%, %prefix%, %suffix%, %death_message%, %online%, %max%

# ---------------------
# World Switch Messages
# ---------------------
enable_world_switch: true
world_switch_message: "<blockquote>🌍 <b>%player%</b> moved: %from_world% → %to_world% (%online%/%max%)</blockquote>"
# Available placeholders: %player%, %displayname%, %prefix%, %suffix%, %from_world%, %to_world%, %online%, %max%

# ---------------------
# Pet Death Messages
# ---------------------
enable_pet_death: true
pet_death_message: "<blockquote>🐾 <b>%player%</b> killed <b>%owner%</b>'s %pet%! (%online%/%max%)</blockquote>"
# Available placeholders: %player%, %displayname%, %prefix%, %suffix%, %owner%, %pet%, %online%, %max%

# ---------------------
# Chat Filter
# ---------------------
enable_chat_filter: true
filtered_words:
  - "badword1"
  - "badword2"
filtered_message: "<blockquote>🚫 <b>%player%</b> used a filtered word. (%online%/%max%)</blockquote>"
# Available placeholders: %player%, %displayname%, %prefix%, %suffix%, %online%, %max%

# ---------------------
# Command Execution Logging
# ---------------------
enable_send_command_executes: false
command_execute_message: "<blockquote>💠 <b>%player%</b> ➥ <code>%command%</code> (%online%/%max%)</blockquote>"
command_executes_chat_id: "CHAT_ID"             # Separate chat ID for command logs (can be same as main)
send_command_executes_to_thread: false
command_executes_group_thread_id: "THREAD_ID"
ignored_commands:
  - "/login"
  - "/register"
  - "/l"
  - "/reg"
# Available placeholders: %player%, %displayname%, %prefix%, %suffix%, %command%, %online%, %max%

# ---------------------
# Prefix Replacements
# ---------------------
# Replace ugly in-game prefixes with clean text for Telegram messages.
# The key is the text to find, the value is what to replace it with.
# Use %prefix% placeholder in message templates to show the replaced prefix.
# Example:
#   prefix_replacements:
#     "VIP": "[VIP]"
#     "ADMIN": "[ADMIN]"
prefix_replacements: {}

# ---------------------
# Telegram Sudo Command
# ---------------------
enable_sudo_command: false                      # Allow admins to execute server commands via /sudo
sudo_show_output: true                          # Show command output in Telegram response
sudo_blacklist:                                 # Commands that cannot be executed via /sudo
  - "stop"
  - "restart"
  - "op"
  - "deop"
  - "ban-ip"

# ---------------------
# Anti-Flood Protection
# ---------------------
anti_flood_enabled: true                        # Rate-limit messages to prevent flooding
anti_flood_max_messages: 20                     # Max messages per window
anti_flood_window_seconds: 10                   # Window duration in seconds

# ---------------------
# Error Messages
# ---------------------
error_not_admin: "<blockquote>❌ You are not registered as an admin!</blockquote>"

# ---------------------
# Debug Mode
# ---------------------
debug_mode: false                               # Enable detailed debug logging

# ---------------------
# Plugin Version (DO NOT EDIT)
# ---------------------
version: "5.0.1"

# ---------------------
# Telegram to Game enhancements
# ---------------------
telegram_to_game_enhancements:
  # Relay messages sent from Telegram back to the same Telegram chat.
  # This is useful for seeing a clean, formatted version of the message.
  enable_telegram_to_telegram_relay: true
  telegram_to_telegram_relay_format: "[TG] %name%: %message%"

  # In-game notifications for @mentions
  enable_mention_notifications: true
  mention_sound: "BLOCK_NOTE_BLOCK_BELL"
  mention_title: "&eYou were mentioned in chat!"
  mention_boss_bar: "&eYou were mentioned by &f%name%"
  mention_highlight_color: "&e" # Yellow
