name: TelegramLogger
prefix: TelegramLogger
version: '5.0.1'
main: uz.lazizbekdev.telegramlogger.TelegramLogger
api-version: '1.16'
author: LazizbekDev
description: Connect your Minecraft server with Telegram! Monitor all server activities in real-time through your Telegram group or channel.
website: https://lazizbekdev.uz

commands:
  telegramlogger:
    description: Main command for TelegramLogger
    usage: |-
      §6§lTelegramLogger §7➜ §cUse these commands:
      §e/tl reload §7- §fReload the plugin
      §e/tl start §7- §fStart message forwarding
      §e/tl stop §7- §fStop message forwarding
      §e/tl stats §7- §fView message statistics
      §e/tl debug §7- §fToggle debug mode
      §e/tl status §7- §fShow plugin status
      §e/tl admin add <id> <name> §7- §fAdd new admin
      §e/tl admin remove <id> §7- §fRemove admin
      §e/tl admin list §7- §fList all admins
      §e/tl help §7- §fShow help message
    aliases: [tl, tlog]
    permission: telegramlogger.admin
    permission-message: §6§lTelegramLogger §7➜ §c§l❌ You don't have permission!

permissions:
  telegramlogger.admin:
    description: Allows full access to all TelegramLogger commands
    default: op

softdepend: []

loadbefore: [Skript, Minepacks, GriefPrevention, AntiWorldDownloader, ItemEdit]
load: STARTUP
